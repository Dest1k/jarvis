# =============================================================================
#  docker-compose.agents.yml — контейнеризованный стек JARVIS-OS.
#
#  Сервисы:
#    vllm-qwen-coder : Qwen2.5-Coder-14B-Instruct-AWQ  (диспетчер + кодер)  ~14.4 ГБ
#    vllm-ui-tars    : UI-TARS-2B-SFT                   (контроллер GUI/ОС)  ~6.4 ГБ
#    audio-layer     : Faster-Whisper Large-v3 + Kokoro (ASR + TTS)          ~2 ГБ
#    sandbox         : изолированная среда исполнения кода кодер-агента
#    backend         : FastAPI-ядро (server.py)
#
#  ТОЧНЫЙ бюджет VRAM на RTX 5090 (32 GiB): Qwen 14.4 + UI-TARS-2B 6.4 + аудио 2.0
#  = 22.8 GiB → резерв ~9.2 GiB (рабочий стол Windows, драйвер). Доли gpu_util —
#  от ПОЛНОЙ памяти; инстансы vLLM поднимаются последовательно, каждый держит
#  свою долю под (веса + overhead + KV-кэш). Расчёт — в bootstrap_installer.py.
# =============================================================================

x-gpu-reservation: &gpu-all
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-vllm-base: &vllm-base
  image: vllm/vllm-openai:latest
  restart: unless-stopped
  ipc: host                      # vLLM требует большой /dev/shm
  # Веса моделей — в EXT4 Docker-томе (jarvis-models), а НЕ в Windows bind-mount:
  # bind-mount монтируется как 9P, и mmap safetensors по 9P крашит vLLM при
  # загрузке. Том наполняет bootstrap (копирует из data/models). Том физически
  # на D: (диск Docker перенесён на D:\jarvis\docker). Кэш HF остаётся bind'ом.
  volumes:
    - jarvis-models:/models
    - jarvis-hf:/root/.cache/huggingface
  environment:
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    - VLLM_WORKER_MULTIPROC_METHOD=spawn
    - NVIDIA_VISIBLE_DEVICES=0
    # Модель — локальная (/models/...). OFFLINE: transformers НЕ должен дёргать
    # HuggingFace Hub и трактовать локальный путь как repo-id (это и роняло vLLM).
    - HF_HUB_OFFLINE=1
    - TRANSFORMERS_OFFLINE=1
    - HF_HUB_ENABLE_HF_TRANSFER=0
    - HF_HUB_DOWNLOAD_TIMEOUT=120
  <<: *gpu-all

services:
  # ---------------------------------------------------------------------------
  # 1. Диспетчер + Кодер-агент — Qwen2.5-Coder-14B (Int4 AWQ), ~14.4 ГБ VRAM
  #    util 0.45 → 14.4 ГБ: веса 9.38 + overhead 0.43 + KV 4.59 (для 16384 нужно
  #    ровно 3.00 ГБ → есть запас 1.6 ГБ). KV/токен = 192 KiB (48 слоёв, 8 KV-голов).
  # ---------------------------------------------------------------------------
  vllm-qwen-coder:
    <<: *vllm-base
    container_name: jarvis-vllm-qwen
    # Модель берётся из ЛОКАЛЬНОГО пути /models/qwen-coder (его наполняет
    # hf_downloader на хосте). Контейнер ничего не качает на старте.
    # --enforce-eager: пропустить torch.compile/CUDA-graph capture → старт с
    # ~10+ мин до ~1-2 мин, меньше VRAM, обход возможных проблем компиляции под
    # Blackwell (sm_120). Цена — инференс на ~10-15% медленнее.
    # Квантование/тип данных — через env, чтобы можно было заменить «мозг»
    # (диспетчер) на другую модель из Пульта: AWQ-модель оставляет дефолт,
    # FP16-модель (например Gemma) задаёт JARVIS_QWEN_QUANT_ARGS="" (пусто) —
    # тогда vLLM определит квантование сам/работает в fp16. Пустое значение
    # допустимо за счёт ${VAR-default} (без двоеточия): default только если UNSET.
    # ОПТИМИЗАЦИИ:
    #  --enable-prefix-caching: переиспользует KV одинаковых префиксов (наш
    #    системный промпт диспетчера повторяется на каждом шаге ReAct → ускорение).
    #  enforce-eager: по умолчанию ВКЛ (стабильный старт на Blackwell sm_120, меньше
    #    VRAM). Для ~10-20% ускорения декодинга включите CUDA-графы, задав в .env
    #    JARVIS_QWEN_ENFORCE_EAGER= (пусто). Профиль gemma12-tars7 имеет запас VRAM.
    command: >
      --model ${JARVIS_QWEN_MODEL_PATH:-/models/qwen-coder-14b}
      --served-model-name qwen-coder
      --dtype ${JARVIS_QWEN_DTYPE:-half}
      ${JARVIS_QWEN_QUANT_ARGS---quantization awq_marlin}
      ${JARVIS_QWEN_ENFORCE_EAGER---enforce-eager}
      --max-model-len ${JARVIS_QWEN_MAX_LEN:-16384}
      --gpu-memory-utilization ${JARVIS_QWEN_GPU_UTIL:-0.45}
      --kv-cache-dtype ${JARVIS_QWEN_KV_DTYPE:-auto}
      --enable-prefix-caching
      --max-num-seqs 8
      --host 0.0.0.0
      --port 8001
    ports:
      - "127.0.0.1:8001:8001"
    # healthcheck через python3 (curl в образе vLLM может отсутствовать → ложный
    # «unhealthy»). start_period большой: загрузка весов в VRAM небыстрая.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 20s
      timeout: 5s
      retries: 40
      start_period: 600s

  # ---------------------------------------------------------------------------
  # 2. Контроллер ОС/GUI — UI-TARS-2B-SFT (Qwen2-VL-2B, FP16), ~6.4 ГБ VRAM
  #    Поднимается ПОСЛЕ Qwen, чтобы корректно учесть остаток свободной памяти.
  #    util 0.20 → 6.4 ГБ: веса ~4.2 + overhead ~0.6 + KV ~1.6 (для 8192 нужно
  #    всего 0.22 ГБ → запас огромный). KV/токен = 28 KiB (28 слоёв, 2 KV-головы).
  # ---------------------------------------------------------------------------
  vllm-ui-tars:
    <<: *vllm-base
    container_name: jarvis-vllm-uitars
    # Лёгкий UI-TARS-2B вместо 7B: 2B (~4.2 ГБ FP16) комфортно живёт рядом с
    # Qwen-14B, тогда как 7B-FP16 (~16 ГБ) не помещался втроём с аудио в 32 ГБ.
    # Отключение — JARVIS_ENABLE_UITARS=0 (bootstrap не стартует этот сервис).
    # Модель из локального пути /models/ui-tars (наполняет hf_downloader).
    # Это VL-модель — vLLM сам определит архитектуру Qwen2VLForConditionalGeneration.
    # --limit-mm-per-prompt НЕ задаём: в vLLM 0.23 он требует JSON-значение
    # (json.loads), а в строке compose оно ломается при разбиении аргументов.
    # Дефолт (1 изображение на запрос) и так соответствует работе UI-TARS
    # (один скриншот на шаг).
    # Модель/квантование/тип/контекст/KV — через env, чтобы профиль мог поднять
    # UI-TARS до старшей версии (1.5-7B в AWQ/GPTQ). Пустой JARVIS_UITARS_QUANT_ARGS
    # (по умолчанию) → vLLM сам определит квантование из конфига модели.
    # ОПТИМИЗАЦИИ (важно для GUI-цикла TARS): --enable-prefix-caching сильно
    # ускоряет повторные шаги — системный промпт UI-TARS на каждом шаге один и
    # тот же, кэш KV переиспользуется (платим только за новый скриншот). CUDA-графы
    # тоже переключаются через JARVIS_UITARS_ENFORCE_EAGER= (пусто) при запасе VRAM.
    command: >
      --model ${JARVIS_UITARS_MODEL_PATH:-/models/ui-tars}
      --served-model-name ui-tars
      --dtype ${JARVIS_UITARS_DTYPE:-half}
      ${JARVIS_UITARS_QUANT_ARGS-}
      ${JARVIS_UITARS_ENFORCE_EAGER---enforce-eager}
      --max-model-len ${JARVIS_UITARS_MAX_LEN:-8192}
      --gpu-memory-utilization ${JARVIS_UITARS_GPU_UTIL:-0.75}
      --kv-cache-dtype ${JARVIS_UITARS_KV_DTYPE:-auto}
      --enable-prefix-caching
      --max-num-seqs 4
      --host 0.0.0.0
      --port 8002
    ports:
      - "127.0.0.1:8002:8002"
    # Порядок (qwen → ui-tars) обеспечивается поэтапным запуском в bootstrap,
    # поэтому здесь service_started (а не service_healthy) — чтобы plain
    # `docker compose up` не блокировался немо на healthcheck.
    depends_on:
      vllm-qwen-coder:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 20s
      timeout: 5s
      retries: 40
      start_period: 300s

  # ---------------------------------------------------------------------------
  # 3. Аудио-слой — Faster-Whisper Large-v3 (ASR) + Kokoro TTS, ~2 ГБ VRAM
  # ---------------------------------------------------------------------------
  audio-layer:
    build:
      context: ../backend
      dockerfile: Dockerfile.audio
      # База — образ vLLM (torch/CUDA уже внутри → не качаем повторно)
      args:
        JARVIS_VLLM_IMAGE: ${JARVIS_VLLM_IMAGE:-vllm/vllm-openai:latest}
        PIP_INDEX_URL: ${JARVIS_PIP_INDEX_URL:-https://pypi.org/simple}
    image: jarvis/audio-layer:latest
    container_name: jarvis-audio
    restart: unless-stopped
    <<: *gpu-all
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_COMPUTE_TYPE=int8_float16
      - KOKORO_VOICE=af_sky
      - NVIDIA_VISIBLE_DEVICES=0
      # Возобновляемая загрузка весов (Whisper/Kokoro) — см. комментарий выше
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DOWNLOAD_TIMEOUT=120
    volumes:
      - jarvis-hf:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8003:8003"
    depends_on:
      vllm-ui-tars:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  # ---------------------------------------------------------------------------
  # 4. Sandbox — изолированная среда исполнения кода кодер-агента.
  #    Без проброса GPU. Сетевой доступ ограничен. ФС — только рабочий volume.
  # ---------------------------------------------------------------------------
  sandbox:
    # Образ с компиляторами C/C++ и Node.js (для run_code на разных языках).
    build:
      context: ../backend
      dockerfile: Dockerfile.sandbox
      args:
        PIP_INDEX_URL: ${JARVIS_PIP_INDEX_URL:-https://pypi.org/simple}
    image: jarvis/sandbox:latest
    container_name: jarvis-sandbox
    restart: unless-stopped
    command: ["sleep", "infinity"]
    working_dir: /workspace
    user: "1000:1000"
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 4g
    pids_limit: 256
    networks:
      - sandbox-net
    volumes:
      - ${JARVIS_DATA_DIR:-../data}/sandbox:/workspace

  # ---------------------------------------------------------------------------
  # 5. Backend — FastAPI-ядро (server.py). Маршрутизация WS и оркестрация.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${JARVIS_PIP_INDEX_URL:-https://pypi.org/simple}
    image: jarvis/backend:latest
    container_name: jarvis-backend
    restart: unless-stopped
    environment:
      - JARVIS_QWEN_URL=http://vllm-qwen-coder:8001/v1
      - JARVIS_UITARS_URL=http://vllm-ui-tars:8002/v1
      - JARVIS_AUDIO_URL=http://audio-layer:8003
      # RPC-мост слушает на Windows-хосте; из WSL зеркалируется в localhost
      - JARVIS_RPC_BRIDGE_URL=ws://host.docker.internal:8765
      - JARVIS_SANDBOX_CONTAINER=jarvis-sandbox
      # Имена served-моделей и контекстные окна — для бюджета контекста агента
      # (чтобы не упереться в окно Qwen/UI-TARS и не спровоцировать OOM по KV).
      - JARVIS_QWEN_MODEL_NAME=qwen-coder
      - JARVIS_UITARS_MODEL_NAME=ui-tars
      - JARVIS_QWEN_MAX_LEN=${JARVIS_QWEN_MAX_LEN:-16384}
      - JARVIS_UITARS_MAX_LEN=${JARVIS_UITARS_MAX_LEN:-8192}
      # Система координат UI-TARS: 2B-SFT=normalized (0-1000), 1.5-7B/2.0=absolute.
      # Задаётся профилем (см. profiles.json); auto — эвристика по величине.
      - JARVIS_UITARS_COORD_MODE=${JARVIS_UITARS_COORD_MODE:-auto}
      # Каталог постоянной памяти агента (диалоги/сводки/факты).
      - JARVIS_MEMORY_DIR=/data/memory
      # MCP: конфиг подключаемых офлайн-серверов инструментов (вендорятся в образ).
      - JARVIS_MCP_CONFIG=/app/mcp_servers.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # управление sandbox
      # Каталог ~/.jarvis хоста (токен RPC-моста) пробрасывается в контейнер.
      # JARVIS_HOME_HOST задаётся bootstrap_installer.py в wsl/.env.
      - ${JARVIS_HOME_HOST:-~/.jarvis}:/root/.jarvis
      # Постоянная память агента — на томе данных (переживает рестарт контейнера).
      - ${JARVIS_DATA_DIR:-../data}/memory:/data/memory
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      vllm-qwen-coder:
        condition: service_started
      audio-layer:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

networks:
  sandbox-net:
    driver: bridge
    internal: true            # sandbox изолирован от внешней сети

volumes:
  # EXT4-тома (быстрый mmap, без 9P). Имена фиксированы (без префикса проекта),
  # чтобы bootstrap мог наполнять их теми же именами. Физически — на диске
  # Docker (перенесён на D:\jarvis\docker).
  jarvis-models:        # веса vLLM (наполняет bootstrap из data/models)
    name: jarvis-models
  jarvis-hf:            # кэш HF для аудио (Whisper/Kokoro качаются в рантайме)
    name: jarvis-hf

# sandbox остаётся bind-mount'ом на D: (JARVIS_DATA_DIR) — ему 9P не мешает.
