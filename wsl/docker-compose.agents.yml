# =============================================================================
#  docker-compose.agents.yml — контейнеризованный стек JARVIS-OS.
# =============================================================================

x-gpu-reservation: &gpu-all
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-vllm-base: &vllm-base
  image: ${JARVIS_VLLM_IMAGE:-vllm/vllm-openai:latest}
  restart: unless-stopped
  ipc: host
  volumes:
    - jarvis-models:/models
    - jarvis-hf:/root/.cache/huggingface
    - jarvis-vllm-cache:/root/.cache/vllm
  environment:
    - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    - VLLM_WORKER_MULTIPROC_METHOD=spawn
    - NVIDIA_VISIBLE_DEVICES=0
    - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    - CUDA_DEVICE_ORDER=${CUDA_DEVICE_ORDER:-PCI_BUS_ID}
    - CUDA_DISABLE_P2P=${CUDA_DISABLE_P2P:-1}
    - NCCL_P2P_DISABLE=${NCCL_P2P_DISABLE:-1}
    - HF_HUB_OFFLINE=1
    - TRANSFORMERS_OFFLINE=1
    - HF_HUB_ENABLE_HF_TRANSFER=0
    - HF_HUB_DOWNLOAD_TIMEOUT=120
  <<: *gpu-all

services:
  vllm-qwen-coder:
    <<: *vllm-base
    container_name: jarvis-vllm-qwen
    command: >
      --model ${JARVIS_QWEN_MODEL_PATH:-/models/qwen-coder-14b}
      --served-model-name qwen-coder
      --dtype ${JARVIS_QWEN_DTYPE:-half}
      ${JARVIS_QWEN_QUANT_ARGS---quantization awq_marlin}
      ${JARVIS_QWEN_ENFORCE_EAGER---enforce-eager}
      --max-model-len ${JARVIS_QWEN_MAX_LEN:-16384}
      --gpu-memory-utilization ${JARVIS_QWEN_GPU_UTIL:-0.45}
      --kv-cache-dtype ${JARVIS_QWEN_KV_DTYPE:-auto}
      --enable-prefix-caching
      --max-num-seqs ${JARVIS_QWEN_MAX_NUM_SEQS:-8}
      ${JARVIS_QWEN_EXTRA_ARGS:-}
      --host 0.0.0.0
      --port 8001
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 20s
      timeout: 5s
      retries: 40
      start_period: 600s

  vllm-ui-tars:
    <<: *vllm-base
    container_name: jarvis-vllm-uitars
    command: >
      --model ${JARVIS_UITARS_MODEL_PATH:-/models/ui-tars}
      --served-model-name ui-tars
      --dtype ${JARVIS_UITARS_DTYPE:-half}
      ${JARVIS_UITARS_QUANT_ARGS-}
      ${JARVIS_UITARS_ENFORCE_EAGER---enforce-eager}
      --max-model-len ${JARVIS_UITARS_MAX_LEN:-8192}
      --gpu-memory-utilization ${JARVIS_UITARS_GPU_UTIL:-0.75}
      --kv-cache-dtype ${JARVIS_UITARS_KV_DTYPE:-auto}
      --enable-prefix-caching
      --max-num-seqs 4
      --host 0.0.0.0
      --port 8002
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      vllm-qwen-coder:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 20s
      timeout: 5s
      retries: 40
      start_period: 300s

  audio-layer:
    build:
      context: ../backend
      dockerfile: Dockerfile.audio
      args:
        JARVIS_VLLM_IMAGE: ${JARVIS_VLLM_IMAGE:-vllm/vllm-openai:latest}
        PIP_INDEX_URL: ${JARVIS_PIP_INDEX_URL:-https://pypi.org/simple}
    image: jarvis/audio-layer:latest
    container_name: jarvis-audio
    restart: unless-stopped
    <<: *gpu-all
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_COMPUTE_TYPE=int8_float16
      - KOKORO_VOICE=af_sky
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - CUDA_DEVICE_ORDER=${CUDA_DEVICE_ORDER:-PCI_BUS_ID}
      - CUDA_DISABLE_P2P=${CUDA_DISABLE_P2P:-1}
      - NCCL_P2P_DISABLE=${NCCL_P2P_DISABLE:-1}
      - JARVIS_AUDIO_NICE=${JARVIS_AUDIO_NICE:--10}
      - JARVIS_AUDIO_MLOCK=${JARVIS_AUDIO_MLOCK:-1}
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - HF_HUB_DOWNLOAD_TIMEOUT=120
    volumes:
      - jarvis-hf:/root/.cache/huggingface
    ports:
      - "127.0.0.1:8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  sandbox:
    build:
      context: ../backend
      dockerfile: Dockerfile.sandbox
      args:
        PIP_INDEX_URL: ${JARVIS_PIP_INDEX_URL:-https://pypi.org/simple}
    image: jarvis/sandbox:latest
    container_name: jarvis-sandbox
    restart: unless-stopped
    command: ["sleep", "infinity"]
    working_dir: /workspace
    user: "1000:1000"
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 4g
    pids_limit: 256
    networks:
      - sandbox-net
    volumes:
      - ${JARVIS_DATA_DIR:-../data}/sandbox:/workspace

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${JARVIS_PIP_INDEX_URL:-https://pypi.org/simple}
    image: jarvis/backend:latest
    container_name: jarvis-backend
    restart: unless-stopped
    environment:
      - JARVIS_QWEN_URL=${JARVIS_QWEN_URL:-http://vllm-qwen-coder:8001/v1}
      - JARVIS_UITARS_URL=${JARVIS_UITARS_URL:-http://vllm-ui-tars:8002/v1}
      - JARVIS_AUDIO_URL=http://audio-layer:8003
      - JARVIS_ENABLE_AUDIO=${JARVIS_ENABLE_AUDIO:-1}
      - JARVIS_RPC_BRIDGE_URL=ws://host.docker.internal:8765
      - JARVIS_SANDBOX_CONTAINER=jarvis-sandbox
      - JARVIS_QWEN_MODEL_NAME=${JARVIS_QWEN_MODEL_NAME:-qwen-coder}
      - JARVIS_UITARS_MODEL_NAME=${JARVIS_UITARS_MODEL_NAME:-ui-tars}
      - JARVIS_QWEN_MAX_LEN=${JARVIS_QWEN_MAX_LEN:-16384}
      - JARVIS_UITARS_MAX_LEN=${JARVIS_UITARS_MAX_LEN:-8192}
      - JARVIS_VISION_MODEL=${JARVIS_VISION_MODEL:-auto}
      - JARVIS_UITARS_COORD_MODE=${JARVIS_UITARS_COORD_MODE:-auto}
      - JARVIS_MEMORY_DIR=/data/memory
      - JARVIS_CORE_DIR=/data/jarvis_core
      - JARVIS_REPO_PATH=${JARVIS_REPO_PATH:-.}
      - JARVIS_MCP_CONFIG=/app/mcp_servers.json
      - JARVIS_MCP_RESTART_SEC=${JARVIS_MCP_RESTART_SEC:-20}
      - JARVIS_MCP_START_TIMEOUT=${JARVIS_MCP_START_TIMEOUT:-150}
      - JARVIS_LIFELONG_LEARNING=${JARVIS_LIFELONG_LEARNING:-0}
      - JARVIS_LEARNING_PAUSE=${JARVIS_LEARNING_PAUSE:-30}
      - JARVIS_LEARNING_MINE_INCIDENTS=${JARVIS_LEARNING_MINE_INCIDENTS:-1}
      - JARVIS_EMBED_PROVIDER=${JARVIS_EMBED_PROVIDER:-local}
      - JARVIS_EMBED_URL=${JARVIS_EMBED_URL:-}
      - JARVIS_EMBED_MODEL=${JARVIS_EMBED_MODEL:-}
      - JARVIS_PLAN_CONCURRENCY=${JARVIS_PLAN_CONCURRENCY:-4}
      - JARVIS_EMBED_CONCURRENCY=${JARVIS_EMBED_CONCURRENCY:-8}
      - JARVIS_FEDERATION_CONCURRENCY=${JARVIS_FEDERATION_CONCURRENCY:-4}
      - JARVIS_GPU_SAMPLE_MS=${JARVIS_GPU_SAMPLE_MS:-1500}
      - JARVIS_BACKGROUND_RUNTIME=${JARVIS_BACKGROUND_RUNTIME:-1}
      - JARVIS_IDLE_AFTER_SEC=${JARVIS_IDLE_AFTER_SEC:-45}
      - JARVIS_IDLE_INTERVAL_SEC=${JARVIS_IDLE_INTERVAL_SEC:-90}
      - JARVIS_SELF_HEAL_ENABLE=${JARVIS_SELF_HEAL_ENABLE:-0}
      - JARVIS_SELF_HEAL_APPLY_PATCH=${JARVIS_SELF_HEAL_APPLY_PATCH:-0}
      - JARVIS_CLUSTER_ENABLE=${JARVIS_CLUSTER_ENABLE:-1}
      - JARVIS_CLUSTER_NODES=${JARVIS_CLUSTER_NODES:-[]}
      - JARVIS_CLUSTER_TIMEOUT=${JARVIS_CLUSTER_TIMEOUT:-120}
      - JARVIS_GPU_WARN_MEM_PCT=${JARVIS_GPU_WARN_MEM_PCT:-88}
      - JARVIS_GPU_CRIT_MEM_PCT=${JARVIS_GPU_CRIT_MEM_PCT:-94}
      - JARVIS_GPU_WARN_TEMP_C=${JARVIS_GPU_WARN_TEMP_C:-78}
      - JARVIS_GPU_CRIT_TEMP_C=${JARVIS_GPU_CRIT_TEMP_C:-84}
      - JARVIS_GPU_GUARD_SAMPLE_SEC=${JARVIS_GPU_GUARD_SAMPLE_SEC:-8}
      - JARVIS_ALLOW_GPU_POWER_LIMIT=${JARVIS_ALLOW_GPU_POWER_LIMIT:-0}
      - JARVIS_GPU_SAFE_POWER_LIMIT_W=${JARVIS_GPU_SAFE_POWER_LIMIT_W:-420}
      - JARVIS_NETWORK_RECOVERY_SERVICES=${JARVIS_NETWORK_RECOVERY_SERVICES:-}
      - JARVIS_NETWORK_RECOVERY_CMD=${JARVIS_NETWORK_RECOVERY_CMD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${JARVIS_HOME_HOST:-~/.jarvis}:/root/.jarvis
      - ${JARVIS_REPO_GIT_DIR:-../.git}:/app/.git:ro
      - ${JARVIS_DATA_DIR:-../data}/memory:/data/memory
      - ${JARVIS_DATA_DIR:-../data}/jarvis_core:/data/jarvis_core
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      vllm-qwen-coder:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

networks:
  sandbox-net:
    driver: bridge
    internal: true

volumes:
  jarvis-models:
    name: jarvis-models
  jarvis-hf:
    name: jarvis-hf
  jarvis-vllm-cache:
    name: jarvis-vllm-cache
