name: JARVIS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend compile and autonomy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall backend
      - name: Run native/autonomy tests
        env:
          JARVIS_BACKGROUND_RUNTIME: '0'
          JARVIS_MEMORY_DIR: /tmp/jarvis-test-memory
          JARVIS_CORE_DIR: /tmp/jarvis-test-core
        run: |
          python backend/tests/test_native_runtime.py
          python backend/tests/test_agent_system.py

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dashboard dependencies
        run: npm install --legacy-peer-deps
      - name: Build dashboard
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: npm run build

  compose:
    name: Docker Compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: docker compose -f wsl/docker-compose.agents.yml --env-file .env.example config
